<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Pastilles — V2</title>
<link href="https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,400;9..144,500&family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet" />
<style>
  :root{--bg:#edf4f7;--card:#fff;--ink:#13313d;--terra:#1c6e8e;--terra-dk:#155a76;--line:#dbe7ec;--muted:#557079;--olive:#5f8fa0}
  *{margin:0;padding:0;box-sizing:border-box}
  body{background:var(--bg);font-family:'Inter',sans-serif;color:var(--ink);font-weight:300;padding:40px 16px;display:flex;justify-content:center}
  .badge{position:fixed;left:16px;bottom:16px;background:var(--terra);color:#fff;font-size:12px;font-weight:600;padding:7px 14px;border-radius:20px}
  .card{max-width:430px;width:100%;background:var(--card);border:1px solid var(--line);border-radius:20px;padding:28px}
  .group{margin-bottom:20px}
  .head{display:flex;justify-content:space-between;align-items:baseline;margin-bottom:10px}
  .lbl{font-size:11.5px;font-weight:600;letter-spacing:.1em;text-transform:uppercase;color:var(--olive)}
  .name{font-size:13px;color:var(--ink);font-weight:500}
  .row{display:flex;gap:11px;flex-wrap:wrap}
  .sw{width:34px;height:34px;border-radius:50%;cursor:pointer;border:1px solid rgba(0,0,0,.12);outline:2px solid transparent;outline-offset:2px;transition:.15s}
  .sw[aria-checked="true"]{outline-color:var(--terra)}
  .cta{display:block;width:100%;text-align:center;background:var(--terra);color:#fff;font-weight:600;border:none;border-radius:40px;padding:15px;font-size:15px;margin-top:6px;cursor:pointer}
  .cta:hover{background:var(--terra-dk)}
</style>
</head>
<body>
<div class="badge">V2 · Pastilles + nom</div>
<div class="card">
  <div class="group" data-group>
    <div class="head"><span class="lbl">Couleur de coque</span><span class="name" data-name>Blanc nacré</span></div>
    <div class="row">
      <span class="sw" style="background:#f1f2ef" data-n="Blanc nacré" aria-checked="true"></span>
      <span class="sw" style="background:#c7cbce" data-n="Gris perle"></span>
      <span class="sw" style="background:#e7e1d7" data-n="Marbre"></span>
      <span class="sw" style="background:#cfe2ea" data-n="Bleu glacier"></span>
      <span class="sw" style="background:#ddd1bd" data-n="Sable"></span>
    </div>
  </div>
  <div class="group" data-group>
    <div class="head"><span class="lbl">Tablier</span><span class="name" data-name>Anthracite</span></div>
    <div class="row">
      <span class="sw" style="background:#2c3034" data-n="Anthracite" aria-checked="true"></span>
      <span class="sw" style="background:#15181b" data-n="Noir"></span>
      <span class="sw" style="background:#5a4632" data-n="Brun"></span>
      <span class="sw" style="background:#6b7177" data-n="Gris ardoise"></span>
      <span class="sw" style="background:#8a7d6d" data-n="Taupe"></span>
    </div>
  </div>
  <button class="cta">Demander un devis</button>
</div>
<script>
  document.querySelectorAll('[data-group]').forEach(g=>{
    const nm=g.querySelector('[data-name]');
    g.querySelectorAll('.sw').forEach(s=>s.addEventListener('click',()=>{
      g.querySelectorAll('.sw').forEach(x=>x.setAttribute('aria-checked','false'));
      s.setAttribute('aria-checked','true'); nm.textContent=s.dataset.n;
    }));
  });
</script>
</body>
</html>
