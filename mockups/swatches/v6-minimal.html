<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Pastilles — V6</title>
<link href="https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,400;9..144,500&family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet" />
<style>
  :root{--bg:#edf4f7;--card:#fff;--ink:#13313d;--terra:#1c6e8e;--terra-dk:#155a76;--line:#dbe7ec;--muted:#557079;--olive:#5f8fa0}
  *{margin:0;padding:0;box-sizing:border-box}
  body{background:var(--bg);font-family:'Inter',sans-serif;color:var(--ink);font-weight:300;padding:40px 16px;display:flex;justify-content:center}
  .badge{position:fixed;left:16px;bottom:16px;background:var(--terra);color:#fff;font-size:12px;font-weight:600;padding:7px 14px;border-radius:20px}
  .card{max-width:430px;width:100%;background:var(--card);border:1px solid var(--line);border-radius:20px;padding:30px}
  .group{margin-bottom:24px}
  .head{display:flex;align-items:baseline;gap:8px;margin-bottom:14px}
  .lbl{font-family:'Fraunces',serif;font-size:18px}
  .sel{font-size:12.5px;color:var(--muted)}
  .row{display:flex;gap:16px}
  .sw{width:40px;height:40px;border-radius:50%;cursor:pointer;border:1px solid rgba(0,0,0,.1);display:flex;align-items:center;justify-content:center;position:relative;transition:.15s}
  .sw[aria-checked="true"]{box-shadow:0 0 0 2px #fff inset,0 0 0 4px var(--terra)}
  .sw svg{opacity:0;width:16px;height:16px}
  .sw[aria-checked="true"] svg{opacity:1}
  .cta{display:block;width:100%;text-align:center;background:var(--terra);color:#fff;font-weight:600;border:none;border-radius:40px;padding:16px;font-size:15px;margin-top:4px;cursor:pointer}
  .cta:hover{background:var(--terra-dk)}
</style>
</head>
<body>
<div class="badge">V6 · Minimal élégant</div>
<div class="card">
  <div class="group" data-group>
    <div class="head"><span class="lbl">Coque</span><span class="sel" data-name>Blanc nacré</span></div>
    <div class="row">
      <span class="sw" style="background:#f1f2ef" data-n="Blanc nacré" aria-checked="true"><svg viewBox="0 0 24 24" fill="none" stroke="#13313d" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"><path d="M20 6 9 17l-5-5"/></svg></span>
      <span class="sw" style="background:#c7cbce" data-n="Gris perle"><svg viewBox="0 0 24 24" fill="none" stroke="#13313d" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"><path d="M20 6 9 17l-5-5"/></svg></span>
      <span class="sw" style="background:#e7e1d7" data-n="Marbre"><svg viewBox="0 0 24 24" fill="none" stroke="#13313d" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"><path d="M20 6 9 17l-5-5"/></svg></span>
      <span class="sw" style="background:#cfe2ea" data-n="Bleu glacier"><svg viewBox="0 0 24 24" fill="none" stroke="#13313d" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"><path d="M20 6 9 17l-5-5"/></svg></span>
      <span class="sw" style="background:#ddd1bd" data-n="Sable"><svg viewBox="0 0 24 24" fill="none" stroke="#13313d" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"><path d="M20 6 9 17l-5-5"/></svg></span>
    </div>
  </div>
  <div class="group" data-group>
    <div class="head"><span class="lbl">Tablier</span><span class="sel" data-name>Anthracite</span></div>
    <div class="row">
      <span class="sw" style="background:#2c3034" data-n="Anthracite" aria-checked="true"><svg viewBox="0 0 24 24" fill="none" stroke="#fff" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"><path d="M20 6 9 17l-5-5"/></svg></span>
      <span class="sw" style="background:#15181b" data-n="Noir"><svg viewBox="0 0 24 24" fill="none" stroke="#fff" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"><path d="M20 6 9 17l-5-5"/></svg></span>
      <span class="sw" style="background:#5a4632" data-n="Brun"><svg viewBox="0 0 24 24" fill="none" stroke="#fff" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"><path d="M20 6 9 17l-5-5"/></svg></span>
      <span class="sw" style="background:#6b7177" data-n="Gris ardoise"><svg viewBox="0 0 24 24" fill="none" stroke="#fff" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"><path d="M20 6 9 17l-5-5"/></svg></span>
      <span class="sw" style="background:#8a7d6d" data-n="Taupe"><svg viewBox="0 0 24 24" fill="none" stroke="#fff" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"><path d="M20 6 9 17l-5-5"/></svg></span>
    </div>
  </div>
  <button class="cta">Demander un devis</button>
</div>
<script>
  document.querySelectorAll('[data-group]').forEach(g=>{
    const nm=g.querySelector('[data-name]');
    g.querySelectorAll('.sw').forEach(s=>s.addEventListener('click',()=>{
      g.querySelectorAll('.sw').forEach(x=>x.setAttribute('aria-checked','false'));
      s.setAttribute('aria-checked','true'); nm.textContent=s.dataset.n;
    }));
  });
</script>
</body>
</html>
