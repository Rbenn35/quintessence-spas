<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Pastilles — V4</title>
<link href="https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,400;9..144,500&family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet" />
<style>
  :root{--bg:#edf4f7;--card:#fff;--ink:#13313d;--terra:#1c6e8e;--terra-dk:#155a76;--line:#dbe7ec;--muted:#557079;--olive:#5f8fa0}
  *{margin:0;padding:0;box-sizing:border-box}
  body{background:var(--bg);font-family:'Inter',sans-serif;color:var(--ink);font-weight:300;padding:40px 16px;display:flex;justify-content:center}
  .badge{position:fixed;left:16px;bottom:16px;background:var(--terra);color:#fff;font-size:12px;font-weight:600;padding:7px 14px;border-radius:20px}
  .card{max-width:430px;width:100%;background:var(--card);border:1px solid var(--line);border-radius:20px;padding:28px}
  .line{display:flex;align-items:center;justify-content:space-between;padding:12px 0;border-bottom:1px solid var(--line)}
  .line:first-of-type{padding-top:0}
  .lbl{font-size:13px}.lbl b{display:block;font-size:11px;color:var(--muted);font-weight:400}
  .row{display:flex;gap:9px}
  .sw{width:24px;height:24px;border-radius:50%;cursor:pointer;border:1px solid rgba(0,0,0,.12);outline:2px solid transparent;outline-offset:1.5px;transition:.15s}
  .sw[aria-checked="true"]{outline-color:var(--terra)}
  .cta{display:block;width:100%;text-align:center;background:var(--terra);color:#fff;font-weight:600;border:none;border-radius:40px;padding:15px;font-size:15px;margin-top:18px;cursor:pointer}
  .cta:hover{background:var(--terra-dk)}
</style>
</head>
<body>
<div class="badge">V4 · Compact en lignes</div>
<div class="card">
  <div class="line" data-group>
    <span class="lbl">Coque<b>Blanc nacré</b></span>
    <div class="row">
      <span class="sw" style="background:#f1f2ef" aria-checked="true"></span>
      <span class="sw" style="background:#c7cbce"></span>
      <span class="sw" style="background:#e7e1d7"></span>
      <span class="sw" style="background:#cfe2ea"></span>
      <span class="sw" style="background:#ddd1bd"></span>
    </div>
  </div>
  <div class="line" data-group>
    <span class="lbl">Tablier<b>Anthracite</b></span>
    <div class="row">
      <span class="sw" style="background:#2c3034" aria-checked="true"></span>
      <span class="sw" style="background:#15181b"></span>
      <span class="sw" style="background:#5a4632"></span>
      <span class="sw" style="background:#6b7177"></span>
      <span class="sw" style="background:#8a7d6d"></span>
    </div>
  </div>
  <button class="cta">Demander un devis</button>
</div>
<script>
  document.querySelectorAll('[data-group]').forEach(g=>{
    g.querySelectorAll('.sw').forEach(s=>s.addEventListener('click',()=>{
      g.querySelectorAll('.sw').forEach(x=>x.setAttribute('aria-checked','false'));
      s.setAttribute('aria-checked','true');
    }));
  });
</script>
</body>
</html>
