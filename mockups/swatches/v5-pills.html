<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Pastilles — V5</title>
<link href="https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,400;9..144,500&family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet" />
<style>
  :root{--bg:#edf4f7;--card:#fff;--ink:#13313d;--terra:#1c6e8e;--terra-dk:#155a76;--line:#dbe7ec;--muted:#557079;--olive:#5f8fa0}
  *{margin:0;padding:0;box-sizing:border-box}
  body{background:var(--bg);font-family:'Inter',sans-serif;color:var(--ink);font-weight:300;padding:40px 16px;display:flex;justify-content:center}
  .badge{position:fixed;left:16px;bottom:16px;background:var(--terra);color:#fff;font-size:12px;font-weight:600;padding:7px 14px;border-radius:20px}
  .card{max-width:430px;width:100%;background:var(--card);border:1px solid var(--line);border-radius:20px;padding:28px}
  .group{margin-bottom:20px}
  .lbl{font-size:11.5px;font-weight:600;letter-spacing:.1em;text-transform:uppercase;color:var(--olive);margin-bottom:11px}
  .row{display:flex;gap:9px;flex-wrap:wrap}
  .pill{display:inline-flex;align-items:center;gap:8px;border:1.5px solid var(--line);border-radius:30px;padding:7px 13px 7px 9px;cursor:pointer;font-size:13px;color:var(--ink);transition:.15s;background:#fff}
  .pill .dot{width:18px;height:18px;border-radius:50%;border:1px solid rgba(0,0,0,.1)}
  .pill[aria-checked="true"]{border-color:var(--terra);background:rgba(28,110,142,.06)}
  .cta{display:block;width:100%;text-align:center;background:var(--terra);color:#fff;font-weight:600;border:none;border-radius:40px;padding:15px;font-size:15px;margin-top:6px;cursor:pointer}
  .cta:hover{background:var(--terra-dk)}
</style>
</head>
<body>
<div class="badge">V5 · Pastilles bordées + nom</div>
<div class="card">
  <div class="group" data-group>
    <div class="lbl">Couleur de coque</div>
    <div class="row">
      <span class="pill" aria-checked="true"><span class="dot" style="background:#f1f2ef"></span>Blanc nacré</span>
      <span class="pill"><span class="dot" style="background:#c7cbce"></span>Gris perle</span>
      <span class="pill"><span class="dot" style="background:#e7e1d7"></span>Marbre</span>
      <span class="pill"><span class="dot" style="background:#cfe2ea"></span>Bleu glacier</span>
    </div>
  </div>
  <div class="group" data-group>
    <div class="lbl">Tablier</div>
    <div class="row">
      <span class="pill" aria-checked="true"><span class="dot" style="background:#2c3034"></span>Anthracite</span>
      <span class="pill"><span class="dot" style="background:#15181b"></span>Noir</span>
      <span class="pill"><span class="dot" style="background:#5a4632"></span>Brun</span>
      <span class="pill"><span class="dot" style="background:#8a7d6d"></span>Taupe</span>
    </div>
  </div>
  <button class="cta">Demander un devis</button>
</div>
<script>
  document.querySelectorAll('[data-group]').forEach(g=>{
    g.querySelectorAll('.pill').forEach(s=>s.addEventListener('click',()=>{
      g.querySelectorAll('.pill').forEach(x=>x.setAttribute('aria-checked','false'));
      s.setAttribute('aria-checked','true');
    }));
  });
</script>
</body>
</html>
